<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>야구 이미지 생성기</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="layout">
      <section class="controls">
        <div class="tab-row">
          <button id="tabResult" class="tab-btn active" type="button">탭1 경기결과</button>
          <button id="tabLineup" class="tab-btn" type="button">탭2 라인업</button>
          <button id="tabVideo" class="tab-btn" type="button">탭3 영상편집</button>
        </div>

        <section id="resultControls" class="tab-panel active">
          <h1>경기결과 만들기</h1>
          <div class="field-row compact">
            <label><input type="radio" name="result" value="win" checked /> 승리</label>
            <label><input type="radio" name="result" value="lose" /> 패배</label>
            <label><input type="radio" name="result" value="draw" /> 무승부</label>
          </div>
          <div class="field-row compact">
            <label><input type="radio" name="kiaSide" value="home" checked /> 홈</label>
            <label><input type="radio" name="kiaSide" value="away" /> 원정</label>
          </div>

          <label class="field">날짜 <input id="gameDate" type="date" /></label>
          <label class="field">상대팀 <select id="opponentTeam"></select></label>
          <label class="field">상대팀명 <input id="opponentName" type="text" /></label>
          <label class="field">구장 <input id="stadiumName" type="text" /></label>

          <h2>스코어</h2>
          <label class="field">홈 점수 <input id="homeScore" type="number" min="0" /></label>
          <label class="field">원정 점수 <input id="awayScore" type="number" min="0" /></label>

          <h2>선수</h2>
          <label class="field">갸VP <input id="mvpName" type="text" /></label>
          <label class="field">성적 <input id="mvpRecord" type="text" /></label>
          <label class="field">승리 투수 <input id="winnerName" type="text" /></label>
          <label class="field">패배 투수 <input id="loserName" type="text" /></label>
          <label class="field">세이브 <input id="saveName" type="text" /></label>
          <label class="field">전체 자간 <input id="globalLetterSpacing" type="number" step="0.1" value="-1" /></label>

          <h2>상대팀명 미세조정</h2>
          <div class="fine-tune-group">
            <label class="fine-tune-row">X <input id="opponentXRange" type="range" min="0" max="1080" value="215" /><input id="opponentXInput" type="number" value="215" /></label>
            <label class="fine-tune-row">Y <input id="opponentYRange" type="range" min="0" max="1350" value="354" /><input id="opponentYInput" type="number" value="354" /></label>
          </div>

          <h2>성적 미세조정</h2>
          <div class="fine-tune-group">
            <label class="fine-tune-row">X <input id="mvpRecordXRange" type="range" min="0" max="1080" value="359" /><input id="mvpRecordXInput" type="number" value="359" /></label>
            <label class="fine-tune-row">Y <input id="mvpRecordYRange" type="range" min="0" max="1350" value="1135" /><input id="mvpRecordYInput" type="number" value="1135" /></label>
          </div>
        </section>

        <section id="lineupControls" class="tab-panel">
          <h1>라인업 만들기</h1>
          <div class="field-row compact">
            <label><input type="radio" name="lineupKiaSide" value="home" checked /> 홈</label>
            <label><input type="radio" name="lineupKiaSide" value="away" /> 원정</label>
          </div>
          <label class="field">날짜 <input id="lineupDate" type="date" /></label>
          <label class="field">상대팀 <select id="lineupOpponentTeam"></select></label>
          <label class="field">상대팀명 <input id="lineupOpponentName" type="text" /></label>
          <label class="field">구장 <input id="lineupStadiumName" type="text" /></label>

          <h2>1~9번 타자/포지션</h2>
          <div id="lineupInputGrid" class="lineup-input-grid"></div>

          <h2>선발투수</h2>
          <label class="field">투수 이름 <input id="lineupPitcherName" type="text" /></label>
          <label class="field">전체 자간 <input id="lineupLetterSpacing" type="number" step="0.1" value="-1" /></label>
          <h2>상대팀명 미세조정</h2>
          <div class="fine-tune-group">
            <label class="fine-tune-row">X <input id="lineupOpponentXRange" type="range" min="0" max="1080" value="228" /><input id="lineupOpponentXInput" type="number" value="228" /></label>
            <label class="fine-tune-row">Y <input id="lineupOpponentYRange" type="range" min="0" max="1350" value="354" /><input id="lineupOpponentYInput" type="number" value="354" /></label>
          </div>

        </section>

        <section id="videoControls" class="tab-panel">
          <h1>영상편집 만들기</h1>
          <label class="field">영상 파일 <input id="videoFileInput" type="file" accept="video/*" /></label>
          <label class="field">1줄 제목 <input id="videoTitleLine1" type="text" placeholder="영상 제목 1줄" /></label>
          <label class="field">2줄 제목 <input id="videoTitleLine2" type="text" placeholder="영상 제목 2줄" /></label>
          <label class="field">날짜 <input id="videoDate" type="date" /></label>
          <label class="field">상대팀 <select id="videoOpponentTeam"></select></label>
          <label class="field">상대팀명 <input id="videoOpponentName" type="text" /></label>
          <label class="field">시작 시간 <input id="videoStartTime" type="number" min="0" step="0.1" value="0" /></label>
          <label class="field">종료 시간 <input id="videoEndTime" type="number" min="0" step="0.1" placeholder="전체 길이" /></label>

          <h2>영상 위치 조정</h2>
          <div class="fine-tune-group">
            <label class="fine-tune-row">X <input id="videoFrameXRange" type="range" min="0" max="260" value="90" /><input id="videoFrameXInput" type="number" value="90" /></label>
            <label class="fine-tune-row">Y <input id="videoFrameYRange" type="range" min="200" max="700" value="360" /><input id="videoFrameYInput" type="number" value="360" /></label>
            <label class="fine-tune-row">크기 <input id="videoFrameScaleRange" type="range" min="60" max="130" value="100" /><input id="videoFrameScaleInput" type="number" value="100" /></label>
          </div>

          <h2>제목 위치 조정</h2>
          <div class="fine-tune-group">
            <label class="fine-tune-row">X <input id="videoTitleXRange" type="range" min="0" max="240" value="120" /><input id="videoTitleXInput" type="number" value="120" /></label>
            <label class="fine-tune-row">Y <input id="videoTitleYRange" type="range" min="100" max="320" value="182" /><input id="videoTitleYInput" type="number" value="182" /></label>
            <label class="fine-tune-row">크기 <input id="videoTitleSizeRange" type="range" min="36" max="88" value="56" /><input id="videoTitleSizeInput" type="number" value="56" /></label>
          </div>

          <h2>날짜/상대팀 위치 조정</h2>
          <div class="fine-tune-group">
            <label class="fine-tune-row">X <input id="videoMetaXRange" type="range" min="0" max="240" value="120" /><input id="videoMetaXInput" type="number" value="120" /></label>
            <label class="fine-tune-row">Y <input id="videoMetaYRange" type="range" min="760" max="1180" value="938" /><input id="videoMetaYInput" type="number" value="938" /></label>
            <label class="fine-tune-row">크기 <input id="videoMetaSizeRange" type="range" min="20" max="44" value="28" /><input id="videoMetaSizeInput" type="number" value="28" /></label>
          </div>

          <p class="fixed-note">MP4 저장을 먼저 시도하고, 브라우저가 막으면 WebM으로 자동 저장합니다.</p>
        </section>

        <div class="button-row">
          <button id="downloadBtn" type="button">PNG 저장</button>
        </div>
      </section>

      <section class="preview-wrap">
        <div class="preview-scale">
          <div id="resultPoster" class="poster tab-preview active">
            <div class="poster-canvas">
              <img id="backgroundLayer" class="layer bg" src="assets/bg-win.png" alt="배경" />
              <img id="playerPhoto" class="layer player is-hidden" src="" alt="선수" />
              <img id="kiaLogo" class="layer team-logo" src="assets/kia2.png" alt="KIA 로고" />
              <img id="oppLogo" class="layer team-logo" src="assets/lg1.png" alt="상대 로고" />
              <div id="dateText" class="layer text date"></div>
              <div id="opponentText" class="layer text opponent"></div>
              <div id="stadiumText" class="layer text stadium"></div>
              <div id="homeScoreText" class="layer text score"></div>
              <div id="awayScoreText" class="layer text score"></div>
              <div id="badgeWin" class="layer badge win">승</div>
              <div id="badgeLose" class="layer badge lose">패</div>
              <div id="badgeSave" class="layer badge save">세</div>
              <div id="winnerText" class="layer text pitcher"></div>
              <div id="loserText" class="layer text pitcher"></div>
              <div id="saveText" class="layer text pitcher"></div>
              <div id="mvpNameText" class="layer text mvp-name"></div>
              <div id="mvpRecordText" class="layer text mvp-record"></div>
            </div>
          </div>
          <img id="resultMobilePreview" class="mobile-preview active" alt="결과 미리보기" />

          <div id="lineupPoster" class="poster tab-preview">
            <div class="poster-canvas">
              <img id="lineupBgLayer" class="layer bg" src="assets/bg-lineup.png" alt="라인업 배경" />
              <img id="lineupPlayerPhoto" class="layer player is-hidden" src="" alt="선발 투수" />
              <div id="lineupDateText" class="layer text lineup-date"></div>
              <div id="lineupOpponentText" class="layer text lineup-opponent"></div>
              <div id="lineupStadiumText" class="layer text lineup-stadium"></div>
              <div id="lineupTextLayer" class="layer lineup-text-layer"></div>
              <div id="lineupPitcherText" class="layer text lineup-pitcher"></div>
            </div>
          </div>
          <img id="lineupMobilePreview" class="mobile-preview" alt="라인업 미리보기" />

          <div id="videoPoster" class="poster tab-preview">
            <div class="poster-canvas video-canvas">
              <img id="videoBgImage" class="layer video-bg-image" src="assets/bg-video.png" alt="영상 배경" />
              <div class="layer video-bg"></div>
              <div class="layer video-ribbon top"></div>
              <div class="layer video-ribbon bottom"></div>
              <div class="layer video-ribbon-text top">오늘의 타이거즈</div>
              <div class="layer video-ribbon-text bottom">오늘의 타이거즈</div>
              <div id="videoTitleText" class="layer video-title-text"></div>
              <video id="videoPreviewElement" class="layer video-preview-element" playsinline muted preload="metadata"></video>
              <div id="videoMetaText" class="layer video-meta-text"></div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
